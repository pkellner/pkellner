    <text x="51" y="166" font-family="Arial, sans-serif" font-size="8" fill="#64748b" text-anchor="middle">Done</text>
    <text x="51" y="183" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#22c55e" text-anchor="middle">316</text>

    <rect x="96" y="150" width="70" height="40" rx="5" fill="#1e293b"/>
    <text x="131" y="166" font-family="Arial, sans-serif" font-size="8" fill="#64748b" text-anchor="middle">Remaining</text>
    <text x="131" y="183" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#f59e0b" text-anchor="middle">946</text>

    <rect x="16" y="198" width="70" height="40" rx="5" fill="#1e293b"/>
    <text x="51" y="214" font-family="Arial, sans-serif" font-size="8" fill="#64748b" text-anchor="middle">Speed</text>
    <text x="51" y="230" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#e2e8f0" text-anchor="middle">~10/min</text>

