  <!-- Title -->
  <text x="550" y="36" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">Hourly Status Emails — Right to Your Phone</text>

  <!-- ============================================ -->
  <!-- Phone 1: 25% progress                       -->
  <!-- ============================================ -->
  <g transform="translate(28, 55)" filter="url(#phoneShadow)">
