<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600" font-family="system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="600" fill="url(#bg)"/>

  <!-- Browser chrome window -->
  <rect x="40" y="30" width="1120" height="540" rx="10" ry="10" fill="#ffffff" filter="url(#shadow)"/>

  <!-- Title bar -->
  <rect x="40" y="30" width="1120" height="36" rx="10" ry="10" fill="#e5e7eb"/>
  <rect x="40" y="56" width="1120" height="10" fill="#e5e7eb"/>

  <!-- Traffic light dots -->
  <circle cx="68" cy="48" r="6" fill="#ef4444"/>
  <circle cx="88" cy="48" r="6" fill="#eab308"/>
  <circle cx="108" cy="48" r="6" fill="#22c55e"/>

  <!-- URL bar -->
  <rect x="180" y="38" width="500" height="20" rx="4" ry="4" fill="#f3f4f6"/>
  <text x="192" y="52" font-size="11" fill="#64748b">evnote-offramp.connectionroad.com/convert</text>

  <!-- Navigation bar -->
  <rect x="40" y="66" width="1120" height="40" fill="#1e293b"/>
  <text x="70" y="91" font-size="15" font-weight="bold" fill="#3b82f6">Evernote Converter</text>
  <text x="1020" y="91" font-size="12" fill="#94a3b8">Dashboard</text>
  <!-- User avatar -->
  <circle cx="1120" cy="86" r="13" fill="#475569"/>
  <circle cx="1120" cy="82" r="5" fill="#94a3b8"/>
  <path d="M1110,95 Q1120,88 1130,95" fill="#94a3b8"/>

  <!-- Step indicator -->
  <!-- Step 1: Upload (active) -->
  <circle cx="320" cy="130" r="14" fill="#3b82f6"/>
  <text x="320" y="135" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">1</text>
  <text x="320" y="155" font-size="11" font-weight="600" fill="#3b82f6" text-anchor="middle">Upload</text>

  <!-- Line 1-2 -->
  <line x1="334" y1="130" x2="466" y2="130" stroke="#cbd5e1" stroke-width="2"/>

  <!-- Step 2: Destination (inactive) -->
  <circle cx="480" cy="130" r="14" fill="none" stroke="#94a3b8" stroke-width="2"/>
  <text x="480" y="135" font-size="12" fill="#94a3b8" text-anchor="middle">2</text>
  <text x="480" y="155" font-size="11" fill="#94a3b8" text-anchor="middle">Destination</text>

  <!-- Line 2-3 -->
  <line x1="494" y1="130" x2="626" y2="130" stroke="#cbd5e1" stroke-width="2"/>

  <!-- Step 3: Configure (inactive) -->
  <circle cx="640" cy="130" r="14" fill="none" stroke="#94a3b8" stroke-width="2"/>
  <text x="640" y="135" font-size="12" fill="#94a3b8" text-anchor="middle">3</text>
  <text x="640" y="155" font-size="11" fill="#94a3b8" text-anchor="middle">Configure</text>

  <!-- Line 3-4 -->
  <line x1="654" y1="130" x2="786" y2="130" stroke="#cbd5e1" stroke-width="2"/>

  <!-- Step 4: Review (inactive) -->
  <circle cx="800" cy="130" r="14" fill="none" stroke="#94a3b8" stroke-width="2"/>
  <text x="800" y="135" font-size="12" fill="#94a3b8" text-anchor="middle">4</text>
  <text x="800" y="155" font-size="11" fill="#94a3b8" text-anchor="middle">Review</text>

  <!-- Drag-and-drop zone -->
  <rect x="200" y="175" width="720" height="180" rx="12" ry="12" fill="none" stroke="#3b82f6" stroke-width="2" stroke-dasharray="10,6"/>

  <!-- Cloud upload icon -->
  <g transform="translate(560, 220)">
    <!-- Cloud body -->
    <path d="M-30,10 C-30,-8 -10,-20 8,-15 C12,-30 38,-28 40,-12 C52,-10 52,10 42,14 L-24,14 C-34,14 -36,6 -30,10 Z" fill="none" stroke="#3b82f6" stroke-width="2.5" stroke-linejoin="round"/>
    <!-- Upload arrow -->
    <line x1="8" y1="28" x2="8" y2="8" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round"/>
    <polyline points="-2,16 8,6 18,16" fill="none" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Drop zone text -->
  <text x="560" y="278" font-size="16" fill="#64748b" text-anchor="middle">Drag your .enex files here</text>
  <text x="560" y="300" font-size="13" fill="#3b82f6" text-anchor="middle">or click to browse</text>

  <!-- Light inner fill for drop zone -->
  <rect x="201" y="176" width="718" height="178" rx="11" ry="11" fill="#eff6ff" opacity="0.4"/>
  <!-- Redraw dashed border on top -->
  <rect x="200" y="175" width="720" height="180" rx="12" ry="12" fill="none" stroke="#3b82f6" stroke-width="2" stroke-dasharray="10,6"/>
  <!-- Redraw cloud icon on top of fill -->
  <g transform="translate(560, 220)">
    <path d="M-30,10 C-30,-8 -10,-20 8,-15 C12,-30 38,-28 40,-12 C52,-10 52,10 42,14 L-24,14 C-34,14 -36,6 -30,10 Z" fill="none" stroke="#3b82f6" stroke-width="2.5" stroke-linejoin="round"/>
    <line x1="8" y1="28" x2="8" y2="8" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round"/>
    <polyline points="-2,16 8,6 18,16" fill="none" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="560" y="278" font-size="16" fill="#64748b" text-anchor="middle">Drag your .enex files here</text>
  <text x="560" y="300" font-size="13" fill="#3b82f6" text-anchor="middle">or click to browse</text>

  <!-- Alternative upload sources -->
  <text x="560" y="385" font-size="12" fill="#94a3b8" text-anchor="middle">Or import from:</text>

  <!-- OneDrive button -->
  <rect x="380" y="395" width="100" height="30" rx="6" ry="6" fill="#f0f9ff" stroke="#0078d4" stroke-width="1.2"/>
  <text x="430" y="414" font-size="11" font-weight="600" fill="#0078d4" text-anchor="middle">OneDrive</text>

  <!-- Dropbox button -->
  <rect x="500" y="395" width="100" height="30" rx="6" ry="6" fill="#f0f4ff" stroke="#0061ff" stroke-width="1.2"/>
  <text x="550" y="414" font-size="11" font-weight="600" fill="#0061ff" text-anchor="middle">Dropbox</text>

  <!-- Google Drive button -->
  <rect x="620" y="395" width="110" height="30" rx="6" ry="6" fill="#f0fdf4" stroke="#1a73e8" stroke-width="1.2"/>
  <text x="675" y="414" font-size="11" font-weight="600" fill="#1a73e8" text-anchor="middle">Google Drive</text>

  <!-- File list row -->
  <rect x="120" y="440" width="880" height="42" rx="8" ry="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Green checkmark circle -->
  <circle cx="150" cy="461" r="11" fill="#22c55e"/>
  <polyline points="144,461 148,466 157,456" fill="none" stroke="#ffffff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Filename -->
  <text x="175" y="466" font-size="13" font-weight="600" fill="#334155">my-recipes.enex</text>

  <!-- File size -->
  <text x="460" y="466" font-size="12" fill="#64748b">1.2 GB</text>

  <!-- Note count -->
  <text x="600" y="466" font-size="12" fill="#64748b">847 notes</text>

  <!-- Ready status pill -->
  <rect x="750" y="450" width="60" height="22" rx="11" ry="11" fill="#dcfce7"/>
  <text x="780" y="465" font-size="11" font-weight="600" fill="#16a34a" text-anchor="middle">Ready</text>

  <!-- Bottom bar / Next button -->
  <rect x="985" y="498" width="90" height="36" rx="8" ry="8" fill="#3b82f6"/>
  <text x="1030" y="521" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">Next</text>

  <!-- MOCKUP RENDERING watermark -->
  <text x="600" y="558" font-size="11" fill="#94a3b8" text-anchor="middle" letter-spacing="3" opacity="0.6">MOCKUP RENDERING</text>
</svg>