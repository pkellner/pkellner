<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" width="1200" height="700">
  <defs>
    <linearGradient id="bgGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow3" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="700" fill="url(#bgGrad3)"/>

  <!-- Browser Chrome -->
  <rect x="40" y="30" width="1120" height="640" rx="8" fill="#ffffff" filter="url(#shadow3)"/>
  <rect x="40" y="30" width="1120" height="40" rx="8" fill="#f1f5f9"/>
  <rect x="40" y="62" width="1120" height="8" fill="#f1f5f9"/>

  <!-- Browser buttons -->
  <circle cx="65" cy="50" r="6" fill="#ef4444"/>
  <circle cx="85" cy="50" r="6" fill="#f59e0b"/>
  <circle cx="105" cy="50" r="6" fill="#22c55e"/>

  <!-- URL bar -->
  <rect x="200" y="40" width="500" height="24" rx="4" fill="#ffffff"/>
  <text x="220" y="57" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">lost-contact-finder.connectionroad.com/compare</text>

  <!-- Navigation -->
  <rect x="40" y="70" width="1120" height="50" fill="#1e293b"/>
  <text x="70" y="102" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">Lost Contact Finder</text>
  <text x="280" y="100" font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8">Dashboard</text>
  <text x="380" y="100" font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8">Connections</text>
  <text x="490" y="100" font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8">Snapshots</text>
  <text x="590" y="100" font-family="system-ui, sans-serif" font-size="13" fill="#ffffff" font-weight="600">Compare</text>

  <!-- User avatar -->
  <circle cx="1100" cy="95" r="16" fill="#3b82f6"/>
  <text x="1094" y="100" font-family="system-ui, sans-serif" font-size="12" fill="#ffffff">PK</text>

  <!-- Main Content Area -->
  <rect x="60" y="140" width="1080" height="510" fill="#ffffff" rx="6"/>

  <!-- Page Title -->
  <text x="90" y="180" font-family="system-ui, sans-serif" font-size="24" font-weight="bold" fill="#1e293b">Compare Snapshots</text>
  <text x="90" y="205" font-family="system-ui, sans-serif" font-size="14" fill="#64748b">See what changed between two points in time</text>

  <!-- Snapshot Selectors -->
  <rect x="90" y="225" width="480" height="60" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="110" y="248" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">FROM SNAPSHOT</text>
  <text x="110" y="270" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#1e293b">Jan 1, 2025 at 6:15 PM (1,248 contacts, 437 events)</text>

  <text x="590" y="255" font-family="system-ui, sans-serif" font-size="20" fill="#94a3b8">&#8594;</text>

  <rect x="630" y="225" width="480" height="60" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="650" y="248" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">TO SNAPSHOT</text>
  <text x="650" y="270" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#1e293b">Jan 2, 2025 at 10:15 AM (1,247 contacts, 438 events)</text>

  <!-- Summary Cards -->
  <rect x="90" y="305" width="200" height="70" rx="8" fill="#fef2f2" stroke="#fecaca" stroke-width="1"/>
  <text x="110" y="330" font-family="system-ui, sans-serif" font-size="11" fill="#991b1b">REMOVED</text>
  <text x="110" y="358" font-family="system-ui, sans-serif" font-size="28" font-weight="bold" fill="#dc2626">3</text>
  <text x="145" y="358" font-family="system-ui, sans-serif" font-size="14" fill="#991b1b">contacts</text>

  <rect x="310" y="305" width="200" height="70" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="330" y="330" font-family="system-ui, sans-serif" font-size="11" fill="#166534">ADDED</text>
  <text x="330" y="358" font-family="system-ui, sans-serif" font-size="28" font-weight="bold" fill="#22c55e">2</text>
  <text x="365" y="358" font-family="system-ui, sans-serif" font-size="14" fill="#166534">contacts</text>

  <rect x="530" y="305" width="200" height="70" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="550" y="330" font-family="system-ui, sans-serif" font-size="11" fill="#1e40af">MODIFIED</text>
  <text x="550" y="358" font-family="system-ui, sans-serif" font-size="28" font-weight="bold" fill="#3b82f6">1</text>
  <text x="575" y="358" font-family="system-ui, sans-serif" font-size="14" fill="#1e40af">contact</text>

  <rect x="750" y="305" width="200" height="70" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="770" y="330" font-family="system-ui, sans-serif" font-size="11" fill="#166534">EVENTS ADDED</text>
  <text x="770" y="358" font-family="system-ui, sans-serif" font-size="28" font-weight="bold" fill="#22c55e">1</text>
  <text x="800" y="358" font-family="system-ui, sans-serif" font-size="14" fill="#166534">event</text>

  <!-- Changes List -->
  <text x="90" y="410" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#1e293b">Changes Detail</text>

  <!-- Removed Section -->
  <rect x="90" y="425" width="1020" height="30" fill="#fef2f2"/>
  <text x="110" y="445" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#991b1b">REMOVED CONTACTS</text>

  <!-- Removed Item 1 -->
  <rect x="90" y="455" width="1020" height="40" fill="#ffffff" stroke="#fecaca" stroke-width="1"/>
  <circle cx="125" cy="475" r="15" fill="#fee2e2"/>
  <text x="120" y="480" font-family="system-ui, sans-serif" font-size="12" fill="#dc2626">-</text>
  <text x="155" y="480" font-family="system-ui, sans-serif" font-size="14" fill="#1e293b">Sarah Johnson</text>
  <text x="350" y="480" font-family="system-ui, sans-serif" font-size="13" fill="#64748b">sarah.j@gmail.com</text>
  <text x="600" y="480" font-family="system-ui, sans-serif" font-size="13" fill="#64748b">+1 (555) 234-5678</text>
  <rect x="950" y="462" width="70" height="26" rx="4" fill="#ef4444"/>
  <text x="962" y="480" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#ffffff">Restore</text>

  <!-- Removed Item 2 -->
  <rect x="90" y="495" width="1020" height="40" fill="#fefefe" stroke="#fecaca" stroke-width="1"/>
  <circle cx="125" cy="515" r="15" fill="#fee2e2"/>
  <text x="120" y="520" font-family="system-ui, sans-serif" font-size="12" fill="#dc2626">-</text>
  <text x="155" y="520" font-family="system-ui, sans-serif" font-size="14" fill="#1e293b">Mike Chen</text>
  <text x="350" y="520" font-family="system-ui, sans-serif" font-size="13" fill="#64748b">mike.chen@outlook.com</text>
  <text x="600" y="520" font-family="system-ui, sans-serif" font-size="13" fill="#64748b">+1 (555) 876-5432</text>
  <rect x="950" y="502" width="70" height="26" rx="4" fill="#ef4444"/>
  <text x="962" y="520" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#ffffff">Restore</text>

  <!-- Added Section -->
  <rect x="90" y="545" width="1020" height="30" fill="#f0fdf4"/>
  <text x="110" y="565" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#166534">ADDED CONTACTS</text>

  <!-- Added Item -->
  <rect x="90" y="575" width="1020" height="40" fill="#ffffff" stroke="#bbf7d0" stroke-width="1"/>
  <circle cx="125" cy="595" r="15" fill="#dcfce7"/>
  <text x="120" y="600" font-family="system-ui, sans-serif" font-size="12" fill="#22c55e">+</text>
  <text x="155" y="600" font-family="system-ui, sans-serif" font-size="14" fill="#1e293b">Emily Rodriguez</text>
  <text x="350" y="600" font-family="system-ui, sans-serif" font-size="13" fill="#64748b">emily.r@company.com</text>
  <text x="600" y="600" font-family="system-ui, sans-serif" font-size="13" fill="#64748b">+1 (555) 111-2222</text>
  <rect x="950" y="582" width="70" height="26" rx="4" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="968" y="600" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">View</text>

  <!-- Mockup Watermark -->
  <rect x="480" y="640" width="240" height="24" rx="4" fill="#f1f5f9"/>
  <text x="510" y="657" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">MOCKUP RENDERING</text>
</svg>
