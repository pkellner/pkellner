<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" width="1200" height="700">
  <defs>
    <linearGradient id="bgGrad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow4" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.1"/>
    </filter>
    <linearGradient id="avatarGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="700" fill="url(#bgGrad4)"/>

  <!-- Browser Chrome -->
  <rect x="40" y="30" width="1120" height="640" rx="8" fill="#ffffff" filter="url(#shadow4)"/>
  <rect x="40" y="30" width="1120" height="40" rx="8" fill="#f1f5f9"/>
  <rect x="40" y="62" width="1120" height="8" fill="#f1f5f9"/>

  <!-- Browser buttons -->
  <circle cx="65" cy="50" r="6" fill="#ef4444"/>
  <circle cx="85" cy="50" r="6" fill="#f59e0b"/>
  <circle cx="105" cy="50" r="6" fill="#22c55e"/>

  <!-- URL bar -->
  <rect x="200" y="40" width="550" height="24" rx="4" fill="#ffffff"/>
  <text x="220" y="57" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">lost-contact-finder.connectionroad.com/snapshots/abc123/items</text>

  <!-- Navigation -->
  <rect x="40" y="70" width="1120" height="50" fill="#1e293b"/>
  <text x="70" y="102" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">Lost Contact Finder</text>
  <text x="280" y="100" font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8">Dashboard</text>
  <text x="380" y="100" font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8">Connections</text>
  <text x="490" y="100" font-family="system-ui, sans-serif" font-size="13" fill="#ffffff" font-weight="600">Snapshots</text>
  <text x="590" y="100" font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8">Compare</text>

  <!-- User avatar -->
  <circle cx="1100" cy="95" r="16" fill="#3b82f6"/>
  <text x="1094" y="100" font-family="system-ui, sans-serif" font-size="12" fill="#ffffff">PK</text>

  <!-- Breadcrumb -->
  <rect x="60" y="130" width="1080" height="30" fill="#f8fafc"/>
  <text x="80" y="150" font-family="system-ui, sans-serif" font-size="12" fill="#3b82f6">Snapshots</text>
  <text x="140" y="150" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8">/</text>
  <text x="155" y="150" font-family="system-ui, sans-serif" font-size="12" fill="#3b82f6">Jan 2, 2025 10:15 AM</text>
  <text x="285" y="150" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8">/</text>
  <text x="300" y="150" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">Items</text>

  <!-- Main Content - Split View -->
  <!-- Left Panel - Contact List -->
  <rect x="60" y="165" width="400" height="485" fill="#ffffff" rx="6"/>

  <!-- Tab Selector -->
  <rect x="70" y="175" width="180" height="32" rx="4" fill="#3b82f6"/>
  <text x="110" y="196" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#ffffff">Contacts (1,247)</text>

  <rect x="260" y="175" width="180" height="32" rx="4" fill="#f1f5f9"/>
  <text x="305" y="196" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">Events (438)</text>

  <!-- Search -->
  <rect x="70" y="220" width="370" height="36" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="90" y="243" font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8">Search contacts...</text>

  <!-- Contact List Items -->
  <!-- Contact 1 - Selected -->
  <rect x="70" y="270" width="370" height="60" rx="6" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <circle cx="105" cy="300" r="22" fill="url(#avatarGrad)"/>
  <text x="95" y="305" font-family="system-ui, sans-serif" font-size="14" fill="#ffffff">JD</text>
  <text x="140" y="293" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#1e293b">John Doe</text>
  <text x="140" y="313" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">john.doe@example.com</text>

  <!-- Contact 2 -->
  <rect x="70" y="340" width="370" height="60" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <circle cx="105" cy="370" r="22" fill="#f59e0b"/>
  <text x="95" y="375" font-family="system-ui, sans-serif" font-size="14" fill="#ffffff">AS</text>
  <text x="140" y="363" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#1e293b">Alice Smith</text>
  <text x="140" y="383" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">alice.smith@company.io</text>

  <!-- Contact 3 -->
  <rect x="70" y="410" width="370" height="60" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <circle cx="105" cy="440" r="22" fill="#22c55e"/>
  <text x="95" y="445" font-family="system-ui, sans-serif" font-size="14" fill="#ffffff">BW</text>
  <text x="140" y="433" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#1e293b">Bob Wilson</text>
  <text x="140" y="453" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">bob@wilson.net</text>

  <!-- Contact 4 -->
  <rect x="70" y="480" width="370" height="60" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <circle cx="105" cy="510" r="22" fill="#8b5cf6"/>
  <text x="95" y="515" font-family="system-ui, sans-serif" font-size="14" fill="#ffffff">CM</text>
  <text x="140" y="503" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#1e293b">Carol Martinez</text>
  <text x="140" y="523" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">carol.m@startup.co</text>

  <!-- Contact 5 -->
  <rect x="70" y="550" width="370" height="60" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <circle cx="105" cy="580" r="22" fill="#ec4899"/>
  <text x="95" y="585" font-family="system-ui, sans-serif" font-size="14" fill="#ffffff">DT</text>
  <text x="140" y="573" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#1e293b">David Thompson</text>
  <text x="140" y="593" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">david.t@enterprise.com</text>

  <!-- Right Panel - Contact Detail -->
  <rect x="480" y="165" width="660" height="485" fill="#ffffff" rx="6" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Contact Header -->
  <rect x="490" y="175" width="640" height="120" fill="#f8fafc" rx="6"/>
  <circle cx="555" cy="235" r="40" fill="url(#avatarGrad)"/>
  <text x="535" y="245" font-family="system-ui, sans-serif" font-size="24" fill="#ffffff">JD</text>

  <text x="620" y="215" font-family="system-ui, sans-serif" font-size="22" font-weight="bold" fill="#1e293b">John Doe</text>
  <text x="620" y="240" font-family="system-ui, sans-serif" font-size="14" fill="#64748b">Senior Software Engineer</text>
  <text x="620" y="265" font-family="system-ui, sans-serif" font-size="14" fill="#64748b">Acme Corporation</text>

  <!-- Photo indicator -->
  <rect x="1020" y="195" width="90" height="24" rx="4" fill="#dcfce7"/>
  <text x="1035" y="212" font-family="system-ui, sans-serif" font-size="11" fill="#166534">Has Photo</text>

  <!-- Contact Details Sections -->
  <!-- Email Section -->
  <text x="510" y="330" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#64748b">EMAIL</text>
  <rect x="510" y="340" width="610" height="45" fill="#f8fafc" rx="4"/>
  <text x="530" y="358" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">Work</text>
  <text x="530" y="375" font-family="system-ui, sans-serif" font-size="14" fill="#3b82f6">john.doe@example.com</text>

  <!-- Phone Section -->
  <text x="510" y="410" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#64748b">PHONE</text>
  <rect x="510" y="420" width="300" height="45" fill="#f8fafc" rx="4"/>
  <text x="530" y="438" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">Mobile</text>
  <text x="530" y="455" font-family="system-ui, sans-serif" font-size="14" fill="#1e293b">+1 (555) 123-4567</text>

  <rect x="820" y="420" width="300" height="45" fill="#f8fafc" rx="4"/>
  <text x="840" y="438" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">Work</text>
  <text x="840" y="455" font-family="system-ui, sans-serif" font-size="14" fill="#1e293b">+1 (555) 987-6543</text>

  <!-- Address Section -->
  <text x="510" y="490" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#64748b">ADDRESS</text>
  <rect x="510" y="500" width="610" height="60" fill="#f8fafc" rx="4"/>
  <text x="530" y="518" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">Work</text>
  <text x="530" y="538" font-family="system-ui, sans-serif" font-size="14" fill="#1e293b">123 Tech Street, Suite 400</text>
  <text x="530" y="555" font-family="system-ui, sans-serif" font-size="14" fill="#1e293b">San Francisco, CA 94102</text>

  <!-- Notes Section -->
  <text x="510" y="590" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#64748b">NOTES</text>
  <rect x="510" y="600" width="610" height="40" fill="#f8fafc" rx="4"/>
  <text x="530" y="625" font-family="system-ui, sans-serif" font-size="13" fill="#64748b">Met at TechConf 2024. Interested in collaboration on AI projects.</text>

  <!-- Mockup Watermark -->
  <rect x="480" y="640" width="240" height="24" rx="4" fill="#f1f5f9"/>
  <text x="510" y="657" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">MOCKUP RENDERING</text>
</svg>
