<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" width="1200" height="700">
  <defs>
    <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="700" fill="url(#bgGrad2)"/>

  <!-- Browser Chrome -->
  <rect x="40" y="30" width="1120" height="640" rx="8" fill="#ffffff" filter="url(#shadow2)"/>
  <rect x="40" y="30" width="1120" height="40" rx="8" fill="#f1f5f9"/>
  <rect x="40" y="62" width="1120" height="8" fill="#f1f5f9"/>

  <!-- Browser buttons -->
  <circle cx="65" cy="50" r="6" fill="#ef4444"/>
  <circle cx="85" cy="50" r="6" fill="#f59e0b"/>
  <circle cx="105" cy="50" r="6" fill="#22c55e"/>

  <!-- URL bar -->
  <rect x="200" y="40" width="500" height="24" rx="4" fill="#ffffff"/>
  <text x="220" y="57" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">lost-contact-finder.connectionroad.com/snapshots</text>

  <!-- Navigation -->
  <rect x="40" y="70" width="1120" height="50" fill="#1e293b"/>
  <text x="70" y="102" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">Lost Contact Finder</text>
  <text x="280" y="100" font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8">Dashboard</text>
  <text x="380" y="100" font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8">Connections</text>
  <text x="490" y="100" font-family="system-ui, sans-serif" font-size="13" fill="#ffffff" font-weight="600">Snapshots</text>
  <text x="590" y="100" font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8">Compare</text>

  <!-- User avatar -->
  <circle cx="1100" cy="95" r="16" fill="#3b82f6"/>
  <text x="1094" y="100" font-family="system-ui, sans-serif" font-size="12" fill="#ffffff">PK</text>

  <!-- Main Content Area -->
  <rect x="60" y="140" width="1080" height="510" fill="#ffffff" rx="6"/>

  <!-- Page Title -->
  <text x="90" y="180" font-family="system-ui, sans-serif" font-size="24" font-weight="bold" fill="#1e293b">Snapshot History</text>
  <text x="90" y="205" font-family="system-ui, sans-serif" font-size="14" fill="#64748b">View all point-in-time captures of your contacts and calendar</text>

  <!-- Filters Row -->
  <rect x="90" y="225" width="180" height="36" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="110" y="248" font-family="system-ui, sans-serif" font-size="13" fill="#64748b">Connection: All</text>

  <rect x="290" y="225" width="160" height="36" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="310" y="248" font-family="system-ui, sans-serif" font-size="13" fill="#64748b">Last 30 days</text>

  <!-- Take Snapshot Button -->
  <rect x="950" y="225" width="150" height="36" rx="6" fill="#3b82f6"/>
  <text x="975" y="248" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#ffffff">Take Snapshot</text>

  <!-- Snapshot Cards -->
  <!-- Card 1 -->
  <rect x="90" y="280" width="1020" height="80" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <circle cx="130" cy="320" r="20" fill="#dcfce7"/>
  <text x="122" y="325" font-family="system-ui, sans-serif" font-size="16" fill="#166534">&#10003;</text>

  <text x="170" y="310" font-family="system-ui, sans-serif" font-size="15" font-weight="600" fill="#1e293b">January 2, 2025 at 10:15 AM</text>
  <text x="170" y="335" font-family="system-ui, sans-serif" font-size="13" fill="#64748b">pete@icloud.com</text>

  <rect x="500" y="300" width="100" height="40" rx="4" fill="#f0fdf4"/>
  <text x="520" y="315" font-family="system-ui, sans-serif" font-size="11" fill="#166534">CONTACTS</text>
  <text x="530" y="335" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#166534">1,247</text>

  <rect x="620" y="300" width="100" height="40" rx="4" fill="#eff6ff"/>
  <text x="645" y="315" font-family="system-ui, sans-serif" font-size="11" fill="#1e40af">EVENTS</text>
  <text x="658" y="335" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#1e40af">438</text>

  <rect x="850" y="307" width="80" height="26" rx="4" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="870" y="325" font-family="system-ui, sans-serif" font-size="12" fill="#3b82f6">Browse</text>

  <rect x="950" y="307" width="80" height="26" rx="4" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="963" y="325" font-family="system-ui, sans-serif" font-size="12" fill="#3b82f6">Compare</text>

  <!-- Card 2 -->
  <rect x="90" y="375" width="1020" height="80" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <circle cx="130" cy="415" r="20" fill="#dcfce7"/>
  <text x="122" y="420" font-family="system-ui, sans-serif" font-size="16" fill="#166534">&#10003;</text>

  <text x="170" y="405" font-family="system-ui, sans-serif" font-size="15" font-weight="600" fill="#1e293b">January 2, 2025 at 6:15 AM</text>
  <text x="170" y="430" font-family="system-ui, sans-serif" font-size="13" fill="#64748b">pete@icloud.com</text>

  <rect x="500" y="395" width="100" height="40" rx="4" fill="#f0fdf4"/>
  <text x="520" y="410" font-family="system-ui, sans-serif" font-size="11" fill="#166534">CONTACTS</text>
  <text x="530" y="430" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#166534">1,245</text>

  <rect x="620" y="395" width="100" height="40" rx="4" fill="#eff6ff"/>
  <text x="645" y="410" font-family="system-ui, sans-serif" font-size="11" fill="#1e40af">EVENTS</text>
  <text x="658" y="430" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#1e40af">438</text>

  <rect x="850" y="402" width="80" height="26" rx="4" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="870" y="420" font-family="system-ui, sans-serif" font-size="12" fill="#3b82f6">Browse</text>

  <rect x="950" y="402" width="80" height="26" rx="4" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="963" y="420" font-family="system-ui, sans-serif" font-size="12" fill="#3b82f6">Compare</text>

  <!-- Card 3 - with warning -->
  <rect x="90" y="470" width="1020" height="80" rx="8" fill="#fffbeb" stroke="#fde68a" stroke-width="1"/>
  <circle cx="130" cy="510" r="20" fill="#fef3c7"/>
  <text x="122" y="515" font-family="system-ui, sans-serif" font-size="16" fill="#92400e">!</text>

  <text x="170" y="500" font-family="system-ui, sans-serif" font-size="15" font-weight="600" fill="#1e293b">January 1, 2025 at 10:15 PM</text>
  <text x="170" y="525" font-family="system-ui, sans-serif" font-size="13" fill="#92400e">3 contacts removed since previous snapshot</text>

  <rect x="500" y="490" width="100" height="40" rx="4" fill="#fef3c7"/>
  <text x="520" y="505" font-family="system-ui, sans-serif" font-size="11" fill="#92400e">CONTACTS</text>
  <text x="530" y="525" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#92400e">1,245</text>

  <rect x="620" y="490" width="100" height="40" rx="4" fill="#eff6ff"/>
  <text x="645" y="505" font-family="system-ui, sans-serif" font-size="11" fill="#1e40af">EVENTS</text>
  <text x="658" y="525" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#1e40af">437</text>

  <rect x="850" y="497" width="80" height="26" rx="4" fill="#ffffff" stroke="#fde68a" stroke-width="1"/>
  <text x="870" y="515" font-family="system-ui, sans-serif" font-size="12" fill="#92400e">Browse</text>

  <rect x="950" y="497" width="80" height="26" rx="4" fill="#f59e0b"/>
  <text x="960" y="515" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#ffffff">Review</text>

  <!-- Card 4 -->
  <rect x="90" y="565" width="1020" height="70" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <circle cx="130" cy="600" r="20" fill="#dcfce7"/>
  <text x="122" y="605" font-family="system-ui, sans-serif" font-size="16" fill="#166534">&#10003;</text>

  <text x="170" y="593" font-family="system-ui, sans-serif" font-size="15" font-weight="600" fill="#1e293b">January 1, 2025 at 6:15 PM</text>
  <text x="170" y="615" font-family="system-ui, sans-serif" font-size="13" fill="#64748b">pete@icloud.com</text>

  <rect x="500" y="583" width="100" height="35" rx="4" fill="#f0fdf4"/>
  <text x="530" y="605" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#166534">1,248</text>

  <rect x="620" y="583" width="100" height="35" rx="4" fill="#eff6ff"/>
  <text x="658" y="605" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#1e40af">437</text>

  <!-- Mockup Watermark -->
  <rect x="480" y="640" width="240" height="24" rx="4" fill="#f1f5f9"/>
  <text x="510" y="657" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">MOCKUP RENDERING</text>
</svg>
