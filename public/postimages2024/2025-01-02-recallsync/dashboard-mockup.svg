<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" width="1200" height="700">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="700" fill="url(#bgGrad)"/>

  <!-- Browser Chrome -->
  <rect x="40" y="30" width="1120" height="640" rx="8" fill="#ffffff" filter="url(#shadow)"/>
  <rect x="40" y="30" width="1120" height="40" rx="8" fill="#f1f5f9"/>
  <rect x="40" y="62" width="1120" height="8" fill="#f1f5f9"/>

  <!-- Browser buttons -->
  <circle cx="65" cy="50" r="6" fill="#ef4444"/>
  <circle cx="85" cy="50" r="6" fill="#f59e0b"/>
  <circle cx="105" cy="50" r="6" fill="#22c55e"/>

  <!-- URL bar -->
  <rect x="200" y="40" width="500" height="24" rx="4" fill="#ffffff"/>
  <text x="220" y="57" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">lost-contact-finder.connectionroad.com/dashboard</text>

  <!-- Navigation -->
  <rect x="40" y="70" width="1120" height="50" fill="#1e293b"/>
  <text x="70" y="102" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">Lost Contact Finder</text>
  <text x="280" y="100" font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8">Dashboard</text>
  <text x="380" y="100" font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8">Connections</text>
  <text x="490" y="100" font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8">Snapshots</text>
  <text x="590" y="100" font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8">Compare</text>

  <!-- User avatar -->
  <circle cx="1100" cy="95" r="16" fill="#3b82f6"/>
  <text x="1094" y="100" font-family="system-ui, sans-serif" font-size="12" fill="#ffffff">PK</text>

  <!-- Main Content Area -->
  <rect x="60" y="140" width="1080" height="510" fill="#ffffff" rx="6"/>

  <!-- Page Title -->
  <text x="90" y="180" font-family="system-ui, sans-serif" font-size="24" font-weight="bold" fill="#1e293b">Dashboard</text>
  <text x="90" y="205" font-family="system-ui, sans-serif" font-size="14" fill="#64748b">Overview of your contacts and calendar backup status</text>

  <!-- Stats Cards Row -->
  <!-- Card 1: Total Contacts -->
  <rect x="90" y="230" width="240" height="100" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="110" y="260" font-family="system-ui, sans-serif" font-size="12" fill="#166534">TOTAL CONTACTS</text>
  <text x="110" y="300" font-family="system-ui, sans-serif" font-size="36" font-weight="bold" fill="#166534">1,247</text>
  <text x="200" y="300" font-family="system-ui, sans-serif" font-size="12" fill="#22c55e">+12 this week</text>

  <!-- Card 2: Calendar Events -->
  <rect x="350" y="230" width="240" height="100" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="370" y="260" font-family="system-ui, sans-serif" font-size="12" fill="#1e40af">CALENDAR EVENTS</text>
  <text x="370" y="300" font-family="system-ui, sans-serif" font-size="36" font-weight="bold" fill="#1e40af">438</text>
  <text x="450" y="300" font-family="system-ui, sans-serif" font-size="12" fill="#3b82f6">next 30 days</text>

  <!-- Card 3: Snapshots -->
  <rect x="610" y="230" width="240" height="100" rx="8" fill="#fef3c7" stroke="#fde68a" stroke-width="1"/>
  <text x="630" y="260" font-family="system-ui, sans-serif" font-size="12" fill="#92400e">TOTAL SNAPSHOTS</text>
  <text x="630" y="300" font-family="system-ui, sans-serif" font-size="36" font-weight="bold" fill="#92400e">156</text>
  <text x="700" y="300" font-family="system-ui, sans-serif" font-size="12" fill="#f59e0b">since Oct 2024</text>

  <!-- Card 4: Changes Detected -->
  <rect x="870" y="230" width="240" height="100" rx="8" fill="#fef2f2" stroke="#fecaca" stroke-width="1"/>
  <text x="890" y="260" font-family="system-ui, sans-serif" font-size="12" fill="#991b1b">CHANGES DETECTED</text>
  <text x="890" y="300" font-family="system-ui, sans-serif" font-size="36" font-weight="bold" fill="#991b1b">23</text>
  <text x="940" y="300" font-family="system-ui, sans-serif" font-size="12" fill="#ef4444">items to review</text>

  <!-- Recent Snapshots Section -->
  <text x="90" y="380" font-family="system-ui, sans-serif" font-size="18" font-weight="600" fill="#1e293b">Recent Snapshots</text>

  <!-- Table Header -->
  <rect x="90" y="400" width="1020" height="35" fill="#f8fafc"/>
  <text x="110" y="423" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#64748b">DATE</text>
  <text x="300" y="423" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#64748b">CONNECTION</text>
  <text x="500" y="423" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#64748b">CONTACTS</text>
  <text x="650" y="423" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#64748b">EVENTS</text>
  <text x="800" y="423" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#64748b">STATUS</text>
  <text x="950" y="423" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#64748b">CHANGES</text>

  <!-- Table Row 1 -->
  <rect x="90" y="435" width="1020" height="45" fill="#ffffff"/>
  <line x1="90" y1="480" x2="1110" y2="480" stroke="#e2e8f0" stroke-width="1"/>
  <text x="110" y="463" font-family="system-ui, sans-serif" font-size="13" fill="#1e293b">Jan 2, 2025 10:15 AM</text>
  <text x="300" y="463" font-family="system-ui, sans-serif" font-size="13" fill="#1e293b">pete@icloud.com</text>
  <text x="500" y="463" font-family="system-ui, sans-serif" font-size="13" fill="#1e293b">1,247</text>
  <text x="650" y="463" font-family="system-ui, sans-serif" font-size="13" fill="#1e293b">438</text>
  <rect x="800" y="450" width="70" height="22" rx="11" fill="#dcfce7"/>
  <text x="815" y="466" font-family="system-ui, sans-serif" font-size="11" fill="#166534">Success</text>
  <text x="950" y="463" font-family="system-ui, sans-serif" font-size="13" fill="#3b82f6">+2 contacts</text>

  <!-- Table Row 2 -->
  <rect x="90" y="480" width="1020" height="45" fill="#fafafa"/>
  <line x1="90" y1="525" x2="1110" y2="525" stroke="#e2e8f0" stroke-width="1"/>
  <text x="110" y="508" font-family="system-ui, sans-serif" font-size="13" fill="#1e293b">Jan 2, 2025 6:15 AM</text>
  <text x="300" y="508" font-family="system-ui, sans-serif" font-size="13" fill="#1e293b">pete@icloud.com</text>
  <text x="500" y="508" font-family="system-ui, sans-serif" font-size="13" fill="#1e293b">1,245</text>
  <text x="650" y="508" font-family="system-ui, sans-serif" font-size="13" fill="#1e293b">438</text>
  <rect x="800" y="495" width="70" height="22" rx="11" fill="#dcfce7"/>
  <text x="815" y="511" font-family="system-ui, sans-serif" font-size="11" fill="#166534">Success</text>
  <text x="950" y="508" font-family="system-ui, sans-serif" font-size="13" fill="#64748b">No changes</text>

  <!-- Table Row 3 -->
  <rect x="90" y="525" width="1020" height="45" fill="#ffffff"/>
  <line x1="90" y1="570" x2="1110" y2="570" stroke="#e2e8f0" stroke-width="1"/>
  <text x="110" y="553" font-family="system-ui, sans-serif" font-size="13" fill="#1e293b">Jan 1, 2025 10:15 PM</text>
  <text x="300" y="553" font-family="system-ui, sans-serif" font-size="13" fill="#1e293b">pete@icloud.com</text>
  <text x="500" y="553" font-family="system-ui, sans-serif" font-size="13" fill="#1e293b">1,245</text>
  <text x="650" y="553" font-family="system-ui, sans-serif" font-size="13" fill="#1e293b">437</text>
  <rect x="800" y="540" width="70" height="22" rx="11" fill="#dcfce7"/>
  <text x="815" y="556" font-family="system-ui, sans-serif" font-size="11" fill="#166534">Success</text>
  <text x="950" y="553" font-family="system-ui, sans-serif" font-size="13" fill="#ef4444">-3 contacts</text>

  <!-- Table Row 4 -->
  <rect x="90" y="570" width="1020" height="45" fill="#fafafa"/>
  <text x="110" y="598" font-family="system-ui, sans-serif" font-size="13" fill="#1e293b">Jan 1, 2025 6:15 PM</text>
  <text x="300" y="598" font-family="system-ui, sans-serif" font-size="13" fill="#1e293b">pete@icloud.com</text>
  <text x="500" y="598" font-family="system-ui, sans-serif" font-size="13" fill="#1e293b">1,248</text>
  <text x="650" y="598" font-family="system-ui, sans-serif" font-size="13" fill="#1e293b">437</text>
  <rect x="800" y="585" width="70" height="22" rx="11" fill="#dcfce7"/>
  <text x="815" y="601" font-family="system-ui, sans-serif" font-size="11" fill="#166534">Success</text>
  <text x="950" y="598" font-family="system-ui, sans-serif" font-size="13" fill="#3b82f6">+1 event</text>

  <!-- Mockup Watermark -->
  <rect x="480" y="640" width="240" height="24" rx="4" fill="#f1f5f9"/>
  <text x="510" y="657" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">MOCKUP RENDERING</text>
</svg>
