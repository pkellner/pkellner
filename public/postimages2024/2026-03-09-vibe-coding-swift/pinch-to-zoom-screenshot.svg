<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 520 800" width="520" height="800">
  <defs>
    <filter id="phoneShadow3"><feDropShadow dx="0" dy="8" stdDeviation="16" flood-opacity="0.4"/></filter>
    <clipPath id="screen3"><rect x="72" y="72" width="376" height="656" rx="32"/></clipPath>
    <linearGradient id="fingerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5d0b0"/>
      <stop offset="40%" style="stop-color:#e8b896"/>
      <stop offset="100%" style="stop-color:#d4a07a"/>
    </linearGradient>
    <filter id="fingerShadow">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-opacity="0.35"/>
    </filter>
    <radialGradient id="fingerTip" cx="50%" cy="40%" r="50%">
      <stop offset="0%" style="stop-color:#f8dcc8"/>
      <stop offset="100%" style="stop-color:#d4a07a"/>
    </radialGradient>
    <linearGradient id="topFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" style="stop-color:#000;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#000;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="520" height="800" fill="#111118"/>

  <g transform="translate(60, 30)">
    <!-- Phone shadow -->
    <ellipse cx="200" cy="750" rx="180" ry="20" fill="rgba(0,0,0,0.3)"/>

    <!-- iPhone frame -->
    <rect x="0" y="0" width="400" height="740" rx="44" fill="#1a1a1a" filter="url(#phoneShadow3)"/>
    <rect x="1" y="1" width="398" height="738" rx="43" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <rect x="4" y="4" width="392" height="732" rx="40" fill="#2a2a2a"/>
    <rect x="8" y="8" width="384" height="724" rx="36" fill="#111"/>

    <g clip-path="url(#screen3)">
      <!-- Full-screen photo -->
      <image href="data:image/jpeg;base64," x="12" y="12" width="376" height="716" preserveAspectRatio="xMidYMid slice"/>

      <!-- Vignette for status bar -->
      <rect x="12" y="12" width="376" height="60" fill="url(#topFade)"/>

      <!-- Status bar -->
      <text x="90" y="40" font-family="Arial, sans-serif" font-size="13" fill="#fff" font-weight="600">9:41</text>
      <rect x="352" y="31" width="20" height="10" rx="2" fill="none" stroke="#fff" stroke-width="1"/>
      <rect x="353" y="32" width="18" height="8" rx="1" fill="#34c759"/>
      <rect x="140" y="14" width="120" height="28" rx="14" fill="#000"/>

      <!-- HD zoom badge -->
      <rect x="300" y="56" width="72" height="24" rx="12" fill="rgba(0,0,0,0.6)"/>
      <text x="336" y="72" font-family="Arial, sans-serif" font-size="11" fill="#fff" text-anchor="middle" font-weight="600">HD Zoom</text>

      <!-- Zoom level -->
      <rect x="140" y="680" width="120" height="30" rx="15" fill="rgba(0,0,0,0.6)"/>
      <text x="200" y="700" font-family="Arial, sans-serif" font-size="12" fill="#fff" text-anchor="middle">2.4x</text>

      <rect x="155" y="718" width="90" height="4" rx="2" fill="rgba(255,255,255,0.3)"/>
    </g>

    <!-- Side buttons for 3D realism -->
    <rect x="-3" y="140" width="3" height="30" rx="1.5" fill="#333"/>
    <rect x="-3" y="180" width="3" height="55" rx="1.5" fill="#333"/>
    <rect x="-3" y="245" width="3" height="55" rx="1.5" fill="#333"/>
    <rect x="400" y="190" width="3" height="65" rx="1.5" fill="#333"/>
  </g>

  <!-- LEFT FINGER (thumb from bottom-left) -->
  <g filter="url(#fingerShadow)">
    <g transform="translate(130, 520) rotate(-25)">
      <rect x="-18" y="-80" width="36" height="100" rx="18" fill="url(#fingerGrad)"/>
      <ellipse cx="0" cy="-78" rx="16" ry="14" fill="url(#fingerTip)"/>
      <ellipse cx="0" cy="-84" rx="10" ry="8" fill="rgba(255,220,200,0.6)"/>
      <ellipse cx="0" cy="-86" rx="8" ry="5" fill="rgba(255,235,225,0.4)"/>
      <path d="M-14,-30 Q0,-25 14,-30" fill="none" stroke="rgba(180,130,100,0.3)" stroke-width="1.5"/>
    </g>
  </g>

  <!-- RIGHT FINGER (index from upper-right) -->
  <g filter="url(#fingerShadow)">
    <g transform="translate(380, 350) rotate(155)">
      <rect x="-18" y="-80" width="36" height="100" rx="18" fill="url(#fingerGrad)"/>
      <ellipse cx="0" cy="-78" rx="16" ry="14" fill="url(#fingerTip)"/>
      <ellipse cx="0" cy="-84" rx="10" ry="8" fill="rgba(255,220,200,0.6)"/>
      <ellipse cx="0" cy="-86" rx="8" ry="5" fill="rgba(255,235,225,0.4)"/>
      <path d="M-14,-30 Q0,-25 14,-30" fill="none" stroke="rgba(180,130,100,0.3)" stroke-width="1.5"/>
    </g>
  </g>

  <!-- Pinch spread indicators -->
  <g opacity="0.85">
    <circle cx="145" cy="470" r="22" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2" stroke-dasharray="6,4"/>
    <circle cx="365" cy="380" r="22" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2" stroke-dasharray="6,4"/>
    <line x1="220" y1="430" x2="170" y2="460" stroke="rgba(255,255,255,0.7)" stroke-width="2.5"/>
    <path d="M175,455 L165,465 L180,460" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="2.5"/>
    <line x1="290" y1="400" x2="340" y2="370" stroke="rgba(255,255,255,0.7)" stroke-width="2.5"/>
    <path d="M335,375 L345,365 L330,370" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="2.5"/>
  </g>

  <!-- Pinch label -->
  <rect x="195" y="408" width="120" height="28" rx="14" fill="rgba(0,0,0,0.7)"/>
  <text x="255" y="427" font-family="Arial, sans-serif" font-size="13" fill="#fff" text-anchor="middle" font-weight="500">Pinch to Zoom</text>

  <!-- Bottom label -->
  <rect x="80" y="765" width="360" height="28" rx="6" fill="rgba(250,115,67,0.92)"/>
  <text x="260" y="784" font-family="Arial, sans-serif" font-size="13" fill="#fff" text-anchor="middle" font-weight="bold">HD Zoom Mode — Pinch to 6x on Full Resolution</text>
</svg>