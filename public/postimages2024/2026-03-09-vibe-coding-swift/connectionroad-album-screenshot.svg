<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" width="960" height="600">
  <defs>
    <filter id="shadow2"><feDropShadow dx="0" dy="4" stdDeviation="10" flood-opacity="0.18"/></filter>
    <clipPath id="browserClip2"><rect x="1" y="38" width="958" height="561" rx="0"/></clipPath>
  </defs>

  <!-- Browser window frame -->
  <rect width="960" height="600" rx="10" fill="#2b2b2b" filter="url(#shadow2)"/>
  <!-- Title bar -->
  <rect width="960" height="38" rx="10" fill="#3a3a3a"/>
  <rect y="28" width="960" height="10" fill="#3a3a3a"/>
  <!-- Traffic lights -->
  <circle cx="20" cy="19" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="19" r="6" fill="#ffbd2e"/>
  <circle cx="60" cy="19" r="6" fill="#28c840"/>
  <!-- URL bar -->
  <rect x="120" y="8" width="720" height="22" rx="4" fill="#1e1e1e"/>
  <text x="136" y="23" font-family="Arial, sans-serif" font-size="11" fill="#8f8">🔒</text>
  <text x="152" y="23" font-family="Arial, sans-serif" font-size="11" fill="#999">connectionroad.com/gallery/biking-in-europe</text>

  <!-- Page background -->
  <rect x="0" y="38" width="960" height="562" fill="#f9fafb" clip-path="url(#browserClip2)"/>

  <!-- Top nav bar -->
  <rect x="0" y="38" width="960" height="52" fill="#ffffff"/>
  <rect x="0" y="89" width="960" height="1" fill="#e5e7eb"/>

  <!-- Logo area -->
  <circle cx="32" cy="64" r="14" fill="#3b82f6"/>
  <text x="28" y="69" font-family="Arial, sans-serif" font-size="14" fill="#fff" font-weight="bold">C</text>
  <text x="54" y="70" font-family="Arial, sans-serif" font-size="17" fill="#111" font-weight="bold">Connection Road</text>
  <text x="210" y="70" font-family="Arial, sans-serif" font-size="13" fill="#6b7280">Photo Album</text>

  <!-- Right nav items -->
  <text x="820" y="69" font-family="Arial, sans-serif" font-size="12" fill="#3b82f6">About</text>
  <text x="880" y="69" font-family="Arial, sans-serif" font-size="12" fill="#6b7280">Sign In</text>

  <!-- Breadcrumb -->
  <rect x="0" y="90" width="960" height="36" fill="#fafafa"/>
  <rect x="0" y="125" width="960" height="1" fill="#e5e7eb"/>
  <text x="24" y="113" font-family="Arial, sans-serif" font-size="12" fill="#3b82f6">Home</text>
  <text x="58" y="113" font-family="Arial, sans-serif" font-size="12" fill="#9ca3af"> / </text>
  <text x="72" y="113" font-family="Arial, sans-serif" font-size="12" fill="#3b82f6">Vacation Photos</text>
  <text x="166" y="113" font-family="Arial, sans-serif" font-size="12" fill="#9ca3af"> / </text>
  <text x="180" y="113" font-family="Arial, sans-serif" font-size="12" fill="#374151" font-weight="600">Biking in Europe</text>

  <!-- Album title area -->
  <text x="24" y="158" font-family="Arial, sans-serif" font-size="22" fill="#111" font-weight="bold">Biking in Europe</text>
  <text x="24" y="178" font-family="Arial, sans-serif" font-size="12" fill="#6b7280">48 photos · Summer 2025</text>

  <!-- Photo grid - 5 columns masonry style with gaps on light background -->
  <!-- Row 1 - varied heights for masonry effect -->
  <rect x="20" y="192" width="176" height="132" rx="2" fill="#2563eb"/>
  <rect x="204" y="192" width="176" height="158" rx="2" fill="#ea580c"/>
  <rect x="388" y="192" width="176" height="118" rx="2" fill="#059669"/>
  <rect x="572" y="192" width="176" height="148" rx="2" fill="#7c3aed"/>
  <rect x="756" y="192" width="176" height="126" rx="2" fill="#dc2626"/>

  <!-- Subtle photo content hints -->
  <!-- Blue tile - sky/water scene -->
  <ellipse cx="108" cy="230" rx="30" ry="8" fill="#60a5fa" opacity="0.5"/>
  <path d="M20,310 L60,270 L100,290 L140,260 L196,310 Z" fill="#1d4ed8" opacity="0.4"/>

  <!-- Orange tile - warm scene -->
  <circle cx="292" cy="250" r="18" fill="#fbbf24" opacity="0.4"/>

  <!-- Green tile - nature -->
  <path d="M388,310 L430,240 L470,270 L510,230 L564,310 Z" fill="#047857" opacity="0.4"/>

  <!-- Purple tile - architecture -->
  <rect x="610" y="260" width="30" height="60" rx="2" fill="#6d28d9" opacity="0.3"/>
  <rect x="650" y="240" width="25" height="80" rx="2" fill="#6d28d9" opacity="0.3"/>
  <rect x="685" y="270" width="20" height="50" rx="2" fill="#6d28d9" opacity="0.3"/>

  <!-- Row 2 -->
  <rect x="20" y="338" width="176" height="148" rx="2" fill="#0891b2"/>
  <rect x="204" y="362" width="176" height="132" rx="2" fill="#ca8a04"/>
  <rect x="388" y="322" width="176" height="152" rx="2" fill="#be185d"/>
  <rect x="572" y="352" width="176" height="140" rx="2" fill="#0d9488"/>
  <rect x="756" y="330" width="176" height="146" rx="2" fill="#9333ea"/>

  <!-- Video play icon on one tile -->
  <circle cx="660" cy="422" r="18" fill="rgba(0,0,0,0.5)"/>
  <path d="M654,412 L672,422 L654,432 Z" fill="rgba(255,255,255,0.85)"/>

  <!-- Caption/edit badge on hover (showing one tile as if hovered) -->
  <rect x="20" y="338" width="176" height="148" rx="2" fill="rgba(0,0,0,0.0)"/>
  <!-- Edit button (glass morphism) -->
  <circle cx="180" cy="354" r="14" fill="rgba(0,0,0,0.55)"/>
  <rect x="174" y="349" width="12" height="2" rx="1" fill="#fff"/>
  <rect x="174" y="353" width="12" height="2" rx="1" fill="#fff"/>
  <rect x="174" y="357" width="8" height="2" rx="1" fill="#fff"/>

  <!-- Row 3 (partially visible - bottom of viewport) -->
  <rect x="20" y="498" width="176" height="100" rx="2" fill="#d97706"/>
  <rect x="204" y="506" width="176" height="94" rx="2" fill="#4f46e5"/>
  <rect x="388" y="486" width="176" height="114" rx="2" fill="#15803d"/>
  <rect x="572" y="504" width="176" height="96" rx="2" fill="#b91c1c"/>
  <rect x="756" y="488" width="176" height="112" rx="2" fill="#0e7490"/>

  <!-- Scroll bar -->
  <rect x="948" y="126" width="8" height="474" rx="4" fill="#e5e7eb"/>
  <rect x="948" y="126" width="8" height="200" rx="4" fill="#9ca3af"/>

  <!-- Bottom rounded corners -->
  <rect x="0" y="590" width="10" height="10" fill="#f9fafb"/>
  <rect x="950" y="590" width="10" height="10" fill="#f9fafb"/>
</svg>
