<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 720" width="900" height="720">
  <defs>
    <linearGradient id="rnGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="swiftGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1e30"/>
      <stop offset="100%" style="stop-color:#0f1a2e"/>
    </linearGradient>
    <linearGradient id="bridgeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="boxShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="720" rx="12" fill="#0d1117"/>

  <!-- ═══════════════════════════════════════════ -->
  <!-- REACT NATIVE LAYER (top)                    -->
  <!-- ═══════════════════════════════════════════ -->
  <rect x="30" y="20" width="840" height="180" rx="12" fill="url(#rnGrad)" stroke="#61DAFB" stroke-width="1.5" opacity="0.95"/>
  <!-- React icon -->
  <circle cx="72" cy="44" r="10" fill="none" stroke="#61DAFB" stroke-width="1.5"/>
  <ellipse cx="72" cy="44" rx="18" ry="7" fill="none" stroke="#61DAFB" stroke-width="1" transform="rotate(30,72,44)"/>
  <ellipse cx="72" cy="44" rx="18" ry="7" fill="none" stroke="#61DAFB" stroke-width="1" transform="rotate(-30,72,44)"/>
  <circle cx="72" cy="44" r="3" fill="#61DAFB"/>
  <text x="96" y="50" font-family="Arial, sans-serif" font-size="16" fill="#61DAFB" font-weight="bold">React Native (Expo)</text>

  <!-- Top boxes: Screens, API Client, Services -->
  <rect x="60" y="68" width="200" height="52" rx="8" fill="rgba(97,218,251,0.08)" stroke="rgba(97,218,251,0.3)" stroke-width="1" filter="url(#boxShadow)"/>
  <text x="160" y="90" font-family="'Courier New', monospace" font-size="13" fill="#61DAFB" text-anchor="middle" font-weight="bold">Screens (TSX)</text>
  <text x="160" y="108" font-family="Arial, sans-serif" font-size="10" fill="rgba(97,218,251,0.6)" text-anchor="middle">Navigation, Album list, Settings</text>

  <rect x="290" y="68" width="200" height="52" rx="8" fill="rgba(97,218,251,0.08)" stroke="rgba(97,218,251,0.3)" stroke-width="1" filter="url(#boxShadow)"/>
  <text x="390" y="90" font-family="'Courier New', monospace" font-size="13" fill="#61DAFB" text-anchor="middle" font-weight="bold">API Client</text>
  <text x="390" y="108" font-family="Arial, sans-serif" font-size="10" fill="rgba(97,218,251,0.6)" text-anchor="middle">Auth, REST endpoints</text>

  <rect x="520" y="68" width="200" height="52" rx="8" fill="rgba(97,218,251,0.08)" stroke="rgba(97,218,251,0.3)" stroke-width="1" filter="url(#boxShadow)"/>
  <text x="620" y="90" font-family="'Courier New', monospace" font-size="13" fill="#61DAFB" text-anchor="middle" font-weight="bold">Services</text>
  <text x="620" y="108" font-family="Arial, sans-serif" font-size="10" fill="rgba(97,218,251,0.6)" text-anchor="middle">Thumbnails, metadata</text>

  <!-- Connector lines down to PinchGrid -->
  <line x1="160" y1="120" x2="160" y2="140" stroke="rgba(97,218,251,0.4)" stroke-width="1.5"/>
  <line x1="390" y1="120" x2="390" y2="140" stroke="rgba(97,218,251,0.4)" stroke-width="1.5"/>
  <line x1="620" y1="120" x2="620" y2="140" stroke="rgba(97,218,251,0.4)" stroke-width="1.5"/>

  <!-- Horizontal merge line -->
  <line x1="160" y1="140" x2="620" y2="140" stroke="rgba(97,218,251,0.4)" stroke-width="1.5"/>
  <line x1="390" y1="140" x2="390" y2="150" stroke="rgba(97,218,251,0.5)" stroke-width="2"/>

  <!-- PinchGrid.tsx box -->
  <rect x="200" y="150" width="380" height="40" rx="8" fill="rgba(97,218,251,0.12)" stroke="#61DAFB" stroke-width="1.5" filter="url(#boxShadow)"/>
  <text x="390" y="175" font-family="'Courier New', monospace" font-size="14" fill="#61DAFB" text-anchor="middle" font-weight="bold">PinchGrid.tsx</text>
  <text x="586" y="175" font-family="Arial, sans-serif" font-size="10" fill="rgba(97,218,251,0.5)">React Native bridge</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- BRIDGE LAYER                                -->
  <!-- ═══════════════════════════════════════════ -->
  <line x1="390" y1="190" x2="390" y2="210" stroke="#a855f7" stroke-width="2"/>
  <!-- Arrow head -->
  <path d="M384,205 L390,215 L396,205" fill="none" stroke="#a855f7" stroke-width="2"/>

  <!-- Bridge bar -->
  <rect x="100" y="216" width="700" height="36" rx="6" fill="url(#bridgeGrad)" opacity="0.9"/>
  <text x="450" y="239" font-family="Arial, sans-serif" font-size="13" fill="#fff" text-anchor="middle" font-weight="bold">Expo Module Bridge</text>
  <text x="240" y="239" font-family="Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.7)" text-anchor="middle">Props</text>
  <text x="660" y="239" font-family="Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.7)" text-anchor="middle">Events</text>
  <!-- Bidirectional arrows -->
  <text x="290" y="240" font-family="Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.5)">&#x2193;</text>
  <text x="610" y="240" font-family="Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.5)">&#x2191;</text>

  <line x1="390" y1="252" x2="390" y2="270" stroke="#a855f7" stroke-width="2"/>
  <path d="M384,265 L390,275 L396,265" fill="none" stroke="#a855f7" stroke-width="2"/>

  <!-- ═══════════════════════════════════════════ -->
  <!-- NATIVE SWIFT LAYER (bottom)                 -->
  <!-- ═══════════════════════════════════════════ -->
  <rect x="30" y="276" width="840" height="424" rx="12" fill="url(#swiftGrad)" stroke="#FA7343" stroke-width="1.5" opacity="0.95"/>
  <!-- Swift icon -->
  <text x="60" y="302" font-family="Arial, sans-serif" font-size="18" fill="#FA7343">&#x2667;</text>
  <text x="82" y="302" font-family="Arial, sans-serif" font-size="16" fill="#FA7343" font-weight="bold">Native Swift Layer</text>

  <!-- Main module box -->
  <rect x="200" y="314" width="500" height="52" rx="8" fill="rgba(250,115,67,0.1)" stroke="#FA7343" stroke-width="1.5" filter="url(#boxShadow)"/>
  <text x="450" y="338" font-family="'Courier New', monospace" font-size="14" fill="#FA7343" text-anchor="middle" font-weight="bold">NativeZoomGridModule.swift</text>
  <text x="450" y="356" font-family="Arial, sans-serif" font-size="10" fill="rgba(250,115,67,0.6)" text-anchor="middle">Expo Module definition + cache management functions</text>

  <!-- Connector from module to view -->
  <line x1="450" y1="366" x2="450" y2="382" stroke="rgba(250,115,67,0.4)" stroke-width="1.5"/>

  <!-- NativeZoomGridView - the big one -->
  <rect x="60" y="382" width="460" height="90" rx="8" fill="rgba(250,115,67,0.08)" stroke="rgba(250,115,67,0.5)" stroke-width="1.5" filter="url(#boxShadow)"/>
  <text x="290" y="404" font-family="'Courier New', monospace" font-size="14" fill="#FA7343" text-anchor="middle" font-weight="bold">NativeZoomGridView.swift</text>
  <text x="290" y="422" font-family="Arial, sans-serif" font-size="10" fill="rgba(250,115,67,0.6)" text-anchor="middle">UICollectionView + ExactGridLayout + GridController</text>
  <!-- Sub-components as pills -->
  <rect x="80" y="434" width="100" height="24" rx="12" fill="rgba(250,115,67,0.15)" stroke="rgba(250,115,67,0.3)" stroke-width="1"/>
  <text x="130" y="450" font-family="Arial, sans-serif" font-size="9" fill="rgba(250,115,67,0.8)" text-anchor="middle">Pinch Zoom</text>
  <rect x="190" y="434" width="100" height="24" rx="12" fill="rgba(250,115,67,0.15)" stroke="rgba(250,115,67,0.3)" stroke-width="1"/>
  <text x="240" y="450" font-family="Arial, sans-serif" font-size="9" fill="rgba(250,115,67,0.8)" text-anchor="middle">ImageCell</text>
  <rect x="300" y="434" width="100" height="24" rx="12" fill="rgba(250,115,67,0.15)" stroke="rgba(250,115,67,0.3)" stroke-width="1"/>
  <text x="350" y="450" font-family="Arial, sans-serif" font-size="9" fill="rgba(250,115,67,0.8)" text-anchor="middle">Detail Icons</text>
  <rect x="410" y="434" width="90" height="24" rx="12" fill="rgba(250,115,67,0.15)" stroke="rgba(250,115,67,0.3)" stroke-width="1"/>
  <text x="455" y="450" font-family="Arial, sans-serif" font-size="9" fill="rgba(250,115,67,0.8)" text-anchor="middle">HD Zoom</text>

  <!-- Right column: Pipeline + Decoder stack -->
  <rect x="550" y="382" width="300" height="52" rx="8" fill="rgba(250,115,67,0.08)" stroke="rgba(250,115,67,0.5)" stroke-width="1.5" filter="url(#boxShadow)"/>
  <text x="700" y="404" font-family="'Courier New', monospace" font-size="13" fill="#FA7343" text-anchor="middle" font-weight="bold">NativeImagePipeline.swift</text>
  <text x="700" y="424" font-family="Arial, sans-serif" font-size="10" fill="rgba(250,115,67,0.6)" text-anchor="middle">HTTP fetching + deduplication</text>

  <!-- Connector -->
  <line x1="700" y1="434" x2="700" y2="450" stroke="rgba(250,115,67,0.3)" stroke-width="1.5"/>

  <rect x="550" y="450" width="300" height="52" rx="8" fill="rgba(250,115,67,0.08)" stroke="rgba(250,115,67,0.5)" stroke-width="1.5" filter="url(#boxShadow)"/>
  <text x="700" y="472" font-family="'Courier New', monospace" font-size="13" fill="#FA7343" text-anchor="middle" font-weight="bold">NativeImageDecoder.swift</text>
  <text x="700" y="492" font-family="Arial, sans-serif" font-size="10" fill="rgba(250,115,67,0.6)" text-anchor="middle">ImageIO downsampling + decode</text>

  <!-- Request types -->
  <rect x="550" y="518" width="300" height="48" rx="8" fill="rgba(250,115,67,0.06)" stroke="rgba(250,115,67,0.3)" stroke-width="1" filter="url(#boxShadow)"/>
  <text x="700" y="540" font-family="'Courier New', monospace" font-size="13" fill="rgba(250,115,67,0.8)" text-anchor="middle" font-weight="bold">NativeImageRequest.swift</text>
  <text x="700" y="556" font-family="Arial, sans-serif" font-size="10" fill="rgba(250,115,67,0.5)" text-anchor="middle">Request / Result / Target types</text>

  <!-- Connector from view to caches -->
  <line x1="290" y1="472" x2="290" y2="500" stroke="rgba(250,115,67,0.3)" stroke-width="1.5"/>

  <!-- Bottom row: Cache components -->
  <rect x="60" y="500" width="240" height="52" rx="8" fill="rgba(250,115,67,0.08)" stroke="rgba(250,115,67,0.5)" stroke-width="1.5" filter="url(#boxShadow)"/>
  <text x="180" y="522" font-family="'Courier New', monospace" font-size="12" fill="#FA7343" text-anchor="middle" font-weight="bold">NativeImageCacheCoordinator</text>
  <text x="180" y="542" font-family="Arial, sans-serif" font-size="10" fill="rgba(250,115,67,0.6)" text-anchor="middle">Zoom cache + cross-cache queries</text>

  <rect x="320" y="500" width="200" height="52" rx="8" fill="rgba(250,115,67,0.08)" stroke="rgba(250,115,67,0.5)" stroke-width="1.5" filter="url(#boxShadow)"/>
  <text x="420" y="522" font-family="'Courier New', monospace" font-size="12" fill="#FA7343" text-anchor="middle" font-weight="bold">DetailLRUCache</text>
  <text x="420" y="542" font-family="Arial, sans-serif" font-size="10" fill="rgba(250,115,67,0.6)" text-anchor="middle">LRU eviction, 1GB budget</text>

  <!-- Connector between caches -->
  <line x1="300" y1="526" x2="320" y2="526" stroke="rgba(250,115,67,0.3)" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Connector from pipeline to view (data flow) -->
  <line x1="550" y1="408" x2="520" y2="408" stroke="rgba(250,115,67,0.3)" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Connector from decoder to pipeline -->
  <line x1="700" y1="502" x2="700" y2="518" stroke="rgba(250,115,67,0.3)" stroke-width="1.5"/>

  <!-- Memory budget indicator -->
  <rect x="60" y="570" width="460" height="36" rx="6" fill="rgba(52,199,89,0.08)" stroke="rgba(52,199,89,0.3)" stroke-width="1"/>
  <!-- Progress bar showing memory tiers -->
  <rect x="70" y="578" width="60" height="8" rx="2" fill="#3b82f6" opacity="0.6"/>
  <rect x="132" y="578" width="60" height="8" rx="2" fill="#8b5cf6" opacity="0.6"/>
  <rect x="194" y="578" width="60" height="8" rx="2" fill="#a855f7" opacity="0.6"/>
  <rect x="256" y="578" width="80" height="8" rx="2" fill="#ec4899" opacity="0.6"/>
  <rect x="338" y="578" width="100" height="8" rx="2" fill="#ef4444" opacity="0.6"/>
  <text x="70" y="600" font-family="Arial, sans-serif" font-size="8" fill="rgba(52,199,89,0.7)">thumb-64</text>
  <text x="132" y="600" font-family="Arial, sans-serif" font-size="8" fill="rgba(52,199,89,0.7)">thumb-128</text>
  <text x="194" y="600" font-family="Arial, sans-serif" font-size="8" fill="rgba(52,199,89,0.7)">thumb-192</text>
  <text x="266" y="600" font-family="Arial, sans-serif" font-size="8" fill="rgba(52,199,89,0.7)">thumb</text>
  <text x="358" y="600" font-family="Arial, sans-serif" font-size="8" fill="rgba(52,199,89,0.7)">detail / display</text>
  <text x="460" y="592" font-family="Arial, sans-serif" font-size="10" fill="rgba(52,199,89,0.6)">5-tier cache (1GB budget)</text>

  <!-- Data flow arrow labels -->
  <g opacity="0.5">
    <text x="754" y="300" font-family="Arial, sans-serif" font-size="10" fill="#aaa">images &#x2191;</text>
    <text x="754" y="314" font-family="Arial, sans-serif" font-size="10" fill="#aaa">events &#x2191;</text>
    <text x="144" y="300" font-family="Arial, sans-serif" font-size="10" fill="#aaa">&#x2193; props</text>
    <text x="144" y="314" font-family="Arial, sans-serif" font-size="10" fill="#aaa">&#x2193; items[]</text>
  </g>

  <!-- Legend at bottom -->
  <rect x="550" y="570" width="310" height="120" rx="8" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="570" y="592" font-family="Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.5)" font-weight="bold">Data Flow</text>
  <line x1="570" y1="610" x2="610" y2="610" stroke="#61DAFB" stroke-width="2"/>
  <text x="620" y="614" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.4)">React Native (TypeScript)</text>
  <line x1="570" y1="632" x2="610" y2="632" stroke="#a855f7" stroke-width="2"/>
  <text x="620" y="636" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.4)">Expo Module Bridge</text>
  <line x1="570" y1="654" x2="610" y2="654" stroke="#FA7343" stroke-width="2"/>
  <text x="620" y="658" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.4)">Native Swift (UIKit)</text>
  <line x1="570" y1="676" x2="610" y2="676" stroke="rgba(52,199,89,0.5)" stroke-width="2"/>
  <text x="620" y="680" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.4)">Multi-tier Image Cache</text>
</svg>
