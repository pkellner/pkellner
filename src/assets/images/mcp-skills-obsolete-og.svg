<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#302b63"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
    <linearGradient id="skillGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4aa"/>
      <stop offset="100%" style="stop-color:#00b4d8"/>
    </linearGradient>
    <linearGradient id="mcpGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb"/>
      <stop offset="100%" style="stop-color:#f5576c"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.06">
    <line x1="0" y1="100" x2="1200" y2="100" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="200" x2="1200" y2="200" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="300" x2="1200" y2="300" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="400" x2="1200" y2="400" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="500" x2="1200" y2="500" stroke="#fff" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="800" y1="0" x2="800" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="1000" y1="0" x2="1000" y2="630" stroke="#fff" stroke-width="1"/>
  </g>

  <!-- Left side: Skills (brain/book icon area) -->
  <g transform="translate(220, 220)">
    <!-- Book icon -->
    <rect x="0" y="10" width="120" height="90" rx="8" fill="none" stroke="url(#skillGlow)" stroke-width="3" opacity="0.9"/>
    <line x1="60" y1="10" x2="60" y2="100" stroke="url(#skillGlow)" stroke-width="2" opacity="0.7"/>
    <line x1="20" y1="35" x2="50" y2="35" stroke="url(#skillGlow)" stroke-width="2" opacity="0.5"/>
    <line x1="20" y1="50" x2="50" y2="50" stroke="url(#skillGlow)" stroke-width="2" opacity="0.5"/>
    <line x1="20" y1="65" x2="50" y2="65" stroke="url(#skillGlow)" stroke-width="2" opacity="0.5"/>
    <line x1="70" y1="35" x2="100" y2="35" stroke="url(#skillGlow)" stroke-width="2" opacity="0.5"/>
    <line x1="70" y1="50" x2="100" y2="50" stroke="url(#skillGlow)" stroke-width="2" opacity="0.5"/>
    <line x1="70" y1="65" x2="100" y2="65" stroke="url(#skillGlow)" stroke-width="2" opacity="0.5"/>
    <!-- Glow effect -->
    <circle cx="60" cy="55" r="70" fill="url(#skillGlow)" opacity="0.04"/>
  </g>
  <text x="280" y="370" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="url(#skillGlow)" text-anchor="middle">SKILLS</text>
  <text x="280" y="400" font-family="Arial, sans-serif" font-size="16" fill="#8b9dc3" text-anchor="middle">Teach the agent</text>

  <!-- Center: VS / arrows -->
  <text x="600" y="285" font-family="Arial, sans-serif" font-size="44" font-weight="bold" fill="#fff" text-anchor="middle" opacity="0.15">vs</text>
  <!-- Connecting arrows -->
  <line x1="430" y1="280" x2="530" y2="280" stroke="#fff" stroke-width="1.5" opacity="0.2" stroke-dasharray="6,4"/>
  <line x1="670" y1="280" x2="770" y2="280" stroke="#fff" stroke-width="1.5" opacity="0.2" stroke-dasharray="6,4"/>

  <!-- Right side: MCP (server/bolt icon area) -->
  <g transform="translate(860, 220)">
    <!-- Server rack icon -->
    <rect x="0" y="0" width="120" height="35" rx="6" fill="none" stroke="url(#mcpGlow)" stroke-width="3" opacity="0.9"/>
    <rect x="0" y="40" width="120" height="35" rx="6" fill="none" stroke="url(#mcpGlow)" stroke-width="3" opacity="0.9"/>
    <rect x="0" y="80" width="120" height="35" rx="6" fill="none" stroke="url(#mcpGlow)" stroke-width="3" opacity="0.9"/>
    <!-- Server dots -->
    <circle cx="100" cy="17" r="5" fill="url(#mcpGlow)" opacity="0.7"/>
    <circle cx="100" cy="57" r="5" fill="url(#mcpGlow)" opacity="0.7"/>
    <circle cx="100" cy="97" r="5" fill="url(#mcpGlow)" opacity="0.7"/>
    <!-- Glow effect -->
    <circle cx="60" cy="55" r="70" fill="url(#mcpGlow)" opacity="0.04"/>
  </g>
  <text x="920" y="370" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="url(#mcpGlow)" text-anchor="middle">MCP</text>
  <text x="920" y="400" font-family="Arial, sans-serif" font-size="16" fill="#8b9dc3" text-anchor="middle">Let the agent act</text>

  <!-- Main title -->
  <text x="600" y="80" font-family="Arial, sans-serif" font-size="42" font-weight="bold" fill="#ffffff" text-anchor="middle">Are MCP Servers Going Obsolete?</text>

  <!-- Subtitle -->
  <text x="600" y="130" font-family="Arial, sans-serif" font-size="26" fill="#00d4aa" text-anchor="middle">No — but the line between skills and MCP</text>
  <text x="600" y="165" font-family="Arial, sans-serif" font-size="26" fill="#00d4aa" text-anchor="middle">is getting clearer</text>

  <!-- Bottom tagline -->
  <text x="600" y="530" font-family="Arial, sans-serif" font-size="20" fill="#8b9dc3" text-anchor="middle">The ecosystem isn't replacing MCP — it's separating concerns</text>

  <!-- peterkellner.net -->
  <text x="600" y="590" font-family="Arial, sans-serif" font-size="18" fill="#555" text-anchor="middle">peterkellner.net</text>
</svg>
