<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="reactGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#61dafb"/>
      <stop offset="100%" style="stop-color:#00bcd4"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#16a34a"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- React logo simplified (orbit rings) -->
  <g transform="translate(600, 250)">
    <ellipse cx="0" cy="0" rx="120" ry="45" fill="none" stroke="url(#reactGrad)" stroke-width="4" opacity="0.7"/>
    <ellipse cx="0" cy="0" rx="120" ry="45" fill="none" stroke="url(#reactGrad)" stroke-width="4" opacity="0.7" transform="rotate(60)"/>
    <ellipse cx="0" cy="0" rx="120" ry="45" fill="none" stroke="url(#reactGrad)" stroke-width="4" opacity="0.7" transform="rotate(-60)"/>
    <circle cx="0" cy="0" r="20" fill="url(#reactGrad)"/>
  </g>

  <!-- Left side: Old way (useRef) - crossed out -->
  <g transform="translate(200, 180)">
    <rect x="-80" y="-30" width="160" height="100" rx="10" fill="#1e293b" stroke="#ef4444" stroke-width="2"/>
    <text x="0" y="0" font-family="Monaco, monospace" font-size="16" fill="#f87171" text-anchor="middle">useRef</text>
    <text x="0" y="25" font-family="Monaco, monospace" font-size="12" fill="#94a3b8" text-anchor="middle">stale closures</text>
    <text x="0" y="45" font-family="Monaco, monospace" font-size="12" fill="#94a3b8" text-anchor="middle">boilerplate</text>
    <!-- Red X -->
    <line x1="-60" y1="-20" x2="60" y2="60" stroke="#ef4444" stroke-width="4"/>
    <line x1="60" y1="-20" x2="-60" y2="60" stroke="#ef4444" stroke-width="4"/>
  </g>

  <!-- Right side: New way (useEffectEvent) - checkmark -->
  <g transform="translate(1000, 180)">
    <rect x="-100" y="-30" width="200" height="100" rx="10" fill="#1e293b" stroke="#22c55e" stroke-width="2"/>
    <text x="0" y="0" font-family="Monaco, monospace" font-size="16" fill="#4ade80" text-anchor="middle">useEffectEvent</text>
    <text x="0" y="25" font-family="Monaco, monospace" font-size="12" fill="#94a3b8" text-anchor="middle">latest values</text>
    <text x="0" y="45" font-family="Monaco, monospace" font-size="12" fill="#94a3b8" text-anchor="middle">stable identity</text>
    <!-- Green checkmark -->
    <g transform="translate(70, -10)">
      <circle cx="0" cy="0" r="18" fill="#22c55e"/>
      <path d="M-8,0 L-2,6 L8,-6" stroke="white" stroke-width="3" fill="none" stroke-linecap="round"/>
    </g>
  </g>

  <!-- Arrow from old to new -->
  <g transform="translate(600, 180)">
    <line x1="-280" y1="20" x2="280" y2="20" stroke="#64748b" stroke-width="2" stroke-dasharray="8,4"/>
    <polygon points="290,20 270,10 270,30" fill="#64748b"/>
  </g>

  <!-- Code snippet decoration -->
  <g transform="translate(600, 400)">
    <rect x="-200" y="-40" width="400" height="80" rx="8" fill="#0f172a" stroke="#334155" stroke-width="2"/>
    <text x="-180" y="-10" font-family="Monaco, monospace" font-size="14" fill="#c084fc">const</text>
    <text x="-125" y="-10" font-family="Monaco, monospace" font-size="14" fill="#f8fafc">onEvent =</text>
    <text x="-10" y="-10" font-family="Monaco, monospace" font-size="14" fill="#22d3ee">useEffectEvent</text>
    <text x="135" y="-10" font-family="Monaco, monospace" font-size="14" fill="#f8fafc">(</text>
    <text x="-180" y="20" font-family="Monaco, monospace" font-size="14" fill="#fbbf24">  () =&gt;</text>
    <text x="-95" y="20" font-family="Monaco, monospace" font-size="14" fill="#f8fafc">console.log(</text>
    <text x="35" y="20" font-family="Monaco, monospace" font-size="14" fill="#4ade80">latestValue</text>
    <text x="140" y="20" font-family="Monaco, monospace" font-size="14" fill="#f8fafc">)</text>
    <text x="155" y="20" font-family="Monaco, monospace" font-size="14" fill="#f8fafc">);</text>
  </g>

  <!-- Title -->
  <text x="600" y="540" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="bold" fill="#f8fafc" text-anchor="middle">Understanding React's useEffectEvent</text>

  <!-- Subtitle -->
  <text x="600" y="590" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="#94a3b8" text-anchor="middle">Say Goodbye to Stale Closures and useRef Workarounds</text>
</svg>
