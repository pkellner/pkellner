<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="lockGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4aa"/>
      <stop offset="100%" style="stop-color:#00a896"/>
    </linearGradient>
    <linearGradient id="dbGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f39c12"/>
      <stop offset="100%" style="stop-color:#e67e22"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Grid pattern -->
  <g opacity="0.1" stroke="#00d4aa" stroke-width="0.5">
    <line x1="0" y1="0" x2="1200" y2="630"/>
    <line x1="0" y1="630" x2="1200" y2="0"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <circle cx="600" cy="315" r="200" fill="none"/>
    <circle cx="600" cy="315" r="280" fill="none"/>
  </g>

  <!-- Decorative code snippets floating -->
  <g font-family="Monaco, monospace" font-size="12" fill="#00d4aa" opacity="0.3">
    <text x="50" y="80">openssl rand -hex 24</text>
    <text x="900" y="100">ALTER USER 'app'@'%'</text>
    <text x="80" y="550">DATABASE_URL=mysql://</text>
    <text x="850" y="520">FLUSH PRIVILEGES;</text>
    <text x="100" y="200">***********************</text>
    <text x="950" y="450">a3f8b2c1d4e5f6...</text>
  </g>

  <!-- Main lock icon (large, center-left) -->
  <g transform="translate(180, 200)" filter="url(#glow)">
    <!-- Lock body -->
    <rect x="0" y="80" width="140" height="120" rx="15" fill="url(#lockGrad)"/>
    <!-- Lock shackle -->
    <path d="M25 80 L25 50 C25 20 45 0 70 0 C95 0 115 20 115 50 L115 80"
          stroke="url(#lockGrad)" stroke-width="18" fill="none" stroke-linecap="round"/>
    <!-- Keyhole -->
    <circle cx="70" cy="130" r="18" fill="#1a1a2e"/>
    <rect x="62" y="130" width="16" height="35" fill="#1a1a2e"/>
    <!-- Checkmark on lock -->
    <path d="M50 135 L65 150 L95 115" stroke="#00ff88" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Rotating arrows around lock -->
  <g transform="translate(250, 315)" stroke="#00d4aa" stroke-width="3" fill="none" opacity="0.7">
    <circle r="130" stroke-dasharray="20 10"/>
    <!-- Arrow 1 -->
    <g transform="rotate(45)">
      <line x1="115" y1="0" x2="145" y2="0"/>
      <polygon points="145,0 135,-8 135,8" fill="#00d4aa"/>
    </g>
    <!-- Arrow 2 -->
    <g transform="rotate(135)">
      <line x1="115" y1="0" x2="145" y2="0"/>
      <polygon points="145,0 135,-8 135,8" fill="#00d4aa"/>
    </g>
    <!-- Arrow 3 -->
    <g transform="rotate(225)">
      <line x1="115" y1="0" x2="145" y2="0"/>
      <polygon points="145,0 135,-8 135,8" fill="#00d4aa"/>
    </g>
    <!-- Arrow 4 -->
    <g transform="rotate(315)">
      <line x1="115" y1="0" x2="145" y2="0"/>
      <polygon points="145,0 135,-8 135,8" fill="#00d4aa"/>
    </g>
  </g>

  <!-- MySQL Database cylinder -->
  <g transform="translate(520, 180)">
    <!-- Cylinder body -->
    <ellipse cx="100" cy="200" rx="80" ry="25" fill="#c0392b"/>
    <rect x="20" y="30" width="160" height="170" fill="url(#dbGrad)"/>
    <ellipse cx="100" cy="30" rx="80" ry="25" fill="#f1c40f"/>
    <!-- Cylinder lines -->
    <ellipse cx="100" cy="80" rx="80" ry="25" fill="none" stroke="#c0392b" stroke-width="2" opacity="0.5"/>
    <ellipse cx="100" cy="130" rx="80" ry="25" fill="none" stroke="#c0392b" stroke-width="2" opacity="0.5"/>
    <!-- MySQL text -->
    <text x="100" y="115" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#fff" text-anchor="middle">MySQL</text>
    <!-- Dolphin simplified icon -->
    <text x="100" y="165" font-size="40" text-anchor="middle">🐬</text>
  </g>

  <!-- AI Robot (right side) -->
  <g transform="translate(820, 160)">
    <!-- Robot head -->
    <rect x="30" y="40" width="140" height="120" rx="20" fill="#4a69bd" stroke="#6a89cc" stroke-width="4"/>
    <!-- Antenna -->
    <line x1="100" y1="40" x2="100" y2="10" stroke="#6a89cc" stroke-width="4"/>
    <circle cx="100" cy="5" r="8" fill="#00d4aa">
      <animate attributeName="opacity" values="1;0.3;1" dur="1s" repeatCount="indefinite"/>
    </circle>
    <!-- Eyes -->
    <circle cx="65" cy="90" r="18" fill="#1a1a2e"/>
    <circle cx="135" cy="90" r="18" fill="#1a1a2e"/>
    <circle cx="65" cy="90" r="10" fill="#00d4aa">
      <animate attributeName="r" values="10;8;10" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="135" cy="90" r="10" fill="#00d4aa">
      <animate attributeName="r" values="10;8;10" dur="2s" repeatCount="indefinite"/>
    </circle>
    <!-- Mouth (smile) -->
    <path d="M60 130 Q100 155 140 130" stroke="#00d4aa" stroke-width="4" fill="none"/>
    <!-- Body -->
    <rect x="45" y="165" width="110" height="100" rx="10" fill="#4a69bd" stroke="#6a89cc" stroke-width="4"/>
    <!-- AI text on body -->
    <text x="100" y="225" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#fff" text-anchor="middle">AI</text>
    <!-- Arms holding password -->
    <rect x="-20" y="180" width="60" height="20" rx="10" fill="#4a69bd" stroke="#6a89cc" stroke-width="3"/>
    <rect x="160" y="180" width="60" height="20" rx="10" fill="#4a69bd" stroke="#6a89cc" stroke-width="3"/>
  </g>

  <!-- Connection line from AI to DB -->
  <g stroke="#00d4aa" stroke-width="3" stroke-dasharray="10 5" opacity="0.6">
    <line x1="720" y1="320" x2="820" y2="320"/>
    <polygon points="815,320 800,312 800,328" fill="#00d4aa"/>
  </g>

  <!-- Speech bubble from AI with password hint -->
  <g transform="translate(870, 380)">
    <path d="M0 0 L180 0 L180 60 L30 60 L15 80 L15 60 L0 60 Z" fill="#2d3436" stroke="#00d4aa" stroke-width="2"/>
    <text x="90" y="38" font-family="Monaco, monospace" font-size="14" fill="#00d4aa" text-anchor="middle">openssl rand -hex</text>
  </g>

  <!-- Title text -->
  <text x="600" y="550" font-family="Arial, sans-serif" font-size="38" font-weight="bold" fill="#ffffff" text-anchor="middle">
    AI-Powered MySQL Password Rotation
  </text>
  <text x="600" y="590" font-family="Arial, sans-serif" font-size="22" fill="#00d4aa" text-anchor="middle">
    Keeping Secrets Secret
  </text>

  <!-- Decorative stars/sparkles -->
  <g fill="#00d4aa" opacity="0.6">
    <polygon points="150,400 155,415 170,415 158,425 163,440 150,430 137,440 142,425 130,415 145,415" transform="scale(0.5)"/>
    <polygon points="1100,150 1105,165 1120,165 1108,175 1113,190 1100,180 1087,190 1092,175 1080,165 1095,165" transform="scale(0.6)"/>
    <polygon points="450,80 453,90 463,90 455,97 458,107 450,100 442,107 445,97 437,90 447,90" transform="scale(0.7)"/>
  </g>
</svg>